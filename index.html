<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Калькулятор — ТРПП Lab5</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 2rem auto; }
    input { width: 100%; padding: 8px; margin: 4px 0; }
    button { padding: 8px 16px; margin-top: 8px; }
    #result { font-size: 1.5rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Калькулятор</h1>
  <input id="a" type="number" value="10" />
  <input id="b" type="number" value="5" />
  <button onclick="calc('add')">+</button>
  <button onclick="calc('sub')">−</button>
  <button onclick="calc('mul')">×</button>
  <button onclick="calc('div')">÷</button>
  <div id="result">—</div>
  <script src="src/calculator.js"></script>
  <script>
    const { add, subtract, multiply, divide } = calculator;
    function calc(op) {
      const a = +document.getElementById('a').value;
      const b = +document.getElementById('b').value;
      const ops = { add, sub: subtract, mul: multiply, div: divide };
      document.getElementById('result').textContent = ops[op](a, b);
    }
  </script>
</body>
</html>
